services:
  - type: web
    name: klyro-email-server
    runtime: node
    region: singapore
    buildCommand: "apt-get update && apt-get install -y python3 && npm install"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SMTP_USE_SSL
        sync: false
